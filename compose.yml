name: ${COMPOSE_PROJECT_NAME:-risky-investor}

services:
  app:
    image: "${RISKY_INVESTOR_IMAGE:-risky-investor-dashboard}:${RISKY_INVESTOR_TAG:-latest}"
    build:
      context: .
      target: runtime
      args:
        APP_VERSION: ${APP_VERSION:-development}
        VCS_REF: ${VCS_REF:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      PORT: "4180"
      PRIVATE_DATA_DIR: /app/data/private
      SCANNER_CONFIG_DIR: /app/scanner/config
      SCANNER_OUTPUT_DIR: /app/scanner/output
      TRUST_PROXY: "1"
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-12}
      RISKY_INVESTOR_ROLE: ${RISKY_INVESTOR_ROLE:-owner}
      RISKY_INVESTOR_USERNAME_FILE: /run/secrets/risky_investor_username
      RISKY_INVESTOR_PASSWORD_HASH_FILE: /run/secrets/risky_investor_password_hash
      SESSION_SECRET_FILE: /run/secrets/risky_investor_session_secret
    secrets:
      - risky_investor_username
      - risky_investor_password_hash
      - risky_investor_session_secret
    volumes:
      - private-data:/app/data/private
      - scanner_config:/app/scanner/config
      - scanner_output:/app/scanner/output:ro
    expose:
      - "4180"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:4180/healthz').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 20s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  scanner:
    image: "${RISKY_INVESTOR_SCANNER_IMAGE:-risky-investor-scanner}:${RISKY_INVESTOR_TAG:-latest}"
    build:
      context: ./scanner
    restart: unless-stopped
    init: true
    environment:
      SCANNER_CONFIG_DIR: /scanner/config
      SCANNER_OUTPUT_DIR: /scanner/output
      SCANNER_STATE_DIR: /scanner/state
      SCANNER_INTERVAL_SECONDS: ${SCANNER_INTERVAL_SECONDS:-3600}
    volumes:
      - scanner_config:/scanner/config:ro
      - scanner_output:/scanner/output
      - scanner_state:/scanner/state
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 20s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

volumes:
  private-data:
  scanner_config:
  scanner_output:
  scanner_state:

secrets:
  risky_investor_username:
    file: ./secrets/username
  risky_investor_password_hash:
    file: ./secrets/password_hash
  risky_investor_session_secret:
    file: ./secrets/session_secret
